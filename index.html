<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Coffee Hub</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0c0c0c; --s1: #161616; --s2: #1e1e1e; --s3: #282828;
  --acc: #C8A96E; --acc2: #96772F; --txt: #EDE8DC;
  --t2: #9A8F7A; --t3: #5a5245; --bdr: #2a2a2a;
  --yes: #4CAF82; --no: #E05252; --may: #E8C547; --r: 8px;
}
body { background: var(--bg); color: var(--txt); font-family: 'Segoe UI', system-ui, sans-serif; padding-bottom: 68px; }
/* HEADER */
header { background: var(--s1); border-bottom: 1px solid var(--bdr); padding: 0 16px; height: 50px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.logo { font-size: 14px; font-weight: 700; letter-spacing: 1px; color: var(--acc); }
.logo span { color: var(--t2); font-weight: 400; font-size: 11px; margin-left: 5px; }
nav { display: none; gap: 4px; }
nav button { background: none; border: none; color: var(--t2); cursor: pointer; padding: 6px 12px; border-radius: var(--r); font-size: 13px; transition: all .2s; }
nav button.on { background: var(--s3); color: var(--acc); }
/* BOTTOM NAV */
.bnav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--s1); border-top: 1px solid var(--bdr); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom, 0); }
.bnav button { flex: 1; background: none; border: none; color: var(--t2); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 8px 4px; font-size: 10px; transition: all .2s; }
.bnav button.on { color: var(--acc); }
.bnav button .bico { font-size: 20px; line-height: 1; }
/* MAIN */
main { max-width: 1400px; margin: 0 auto; padding: 14px; }
/* STATS */
.stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stat { background: var(--s2); border: 1px solid var(--bdr); border-radius: var(--r); padding: 12px 14px; }
.stn { font-size: 22px; font-weight: 700; color: var(--acc); }
.stl { font-size: 11px; color: var(--t2); margin-top: 2px; }
/* SYSTEM TOGGLE */
.sys-toggle { display: flex; gap: 8px; margin-bottom: 12px; }
.sys-btn { flex: 1; border: 1px solid var(--bdr); border-radius: var(--r); padding: 9px 4px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s; text-align: center; }
/* FILTERS */
.filters { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.fi, .fs { background: var(--s2); border: 1px solid var(--bdr); color: var(--txt); border-radius: var(--r); padding: 9px 11px; font-size: 13px; outline: none; width: 100%; }
.fi:focus, .fs:focus { border-color: var(--acc); }
.fs option { background: var(--s2); }
.frow { display: flex; gap: 8px; }
.frow .fs { flex: 1; }
/* CARDS */
.grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
.card { background: var(--s2); border: 1px solid var(--bdr); border-radius: var(--r); padding: 13px; cursor: pointer; transition: background .25s, border-color .25s, box-shadow .25s; }
.card:active { border-color: var(--acc); }
.card.clr { background: linear-gradient(105deg, var(--cap-t) 0%, var(--s2) 60%); border-left: 4px solid var(--cap-clr); }
.card.clr:hover { background: linear-gradient(105deg, var(--cap-h) 0%, var(--s2) 55%); box-shadow: -3px 0 12px var(--cap-t); }
.card-hd { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
.card-name { font-weight: 600; font-size: 14px; line-height: 1.3; }
.badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 12px; flex-shrink: 0; margin-left: 6px; white-space: nowrap; }
.badge.OL { background: rgba(200,169,110,.15); color: var(--acc); border: 1px solid rgba(200,169,110,.3); }
.badge.VL { background: rgba(110,158,200,.15); color: #6E9EC8; border: 1px solid rgba(110,158,200,.3); }
.card-col { font-size: 11px; color: var(--t3); margin-bottom: 6px; }
.card-fla { font-size: 12px; color: var(--t2); margin-bottom: 10px; font-style: italic; }
.card-ft { display: flex; align-items: flex-end; justify-content: space-between; }
/* INTENSITY */
.ibar-wrap { display: flex; align-items: center; gap: 5px; }
.ibar { width: 64px; height: 5px; background: var(--s3); border-radius: 3px; overflow: hidden; }
.ibar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--acc2), var(--acc)); }
.inum { font-size: 10px; color: var(--t3); }
/* STARS */
.stars { display: flex; gap: 1px; }
.s { font-size: 12px; } .s.f { color: var(--acc); } .s.h { color: var(--acc); opacity: .5; } .s.e { color: var(--s3); }
.sinp { display: flex; gap: 3px; }
.sinp button { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--s3); transition: color .1s; line-height: 1; padding: 2px; }
.sinp button.on { color: var(--acc); }
/* CHIPS */
.chip { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 12px; }
.chip.Yes { background: rgba(76,175,130,.15); color: var(--yes); }
.chip.No { background: rgba(224,82,82,.15); color: var(--no); }
.chip.Maybe { background: rgba(232,197,71,.15); color: var(--may); }
.chip.X { background: rgba(90,82,69,.2); color: var(--t3); }
/* BUTTONS */
.btn { border: none; border-radius: var(--r); padding: 10px 18px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s; }
.ba { background: var(--acc); color: #000; } .ba:hover { background: var(--acc2); }
.bg { background: none; border: 1px solid var(--bdr); color: var(--t2); } .bg:hover { border-color: var(--t2); color: var(--txt); }
.brow { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
/* MODAL */
.ov { position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 200; display: flex; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
.modal { background: var(--s1); border: 1px solid var(--bdr); border-radius: 16px 16px 0 0; width: 100%; max-height: 88vh; overflow-y: auto; }
.mhd { padding: 18px 18px 0; display: flex; justify-content: space-between; align-items: flex-start; }
.mtitle { font-size: 18px; font-weight: 700; line-height: 1.3; }
.mcls { background: none; border: none; color: var(--t2); font-size: 22px; cursor: pointer; line-height: 1; flex-shrink: 0; margin-left: 8px; padding: 2px 6px; }
.mbody { padding: 14px 18px 20px; }
.drow { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.di { background: var(--s2); border-radius: 6px; padding: 10px 12px; flex: 1; min-width: 100px; }
.dl { font-size: 10px; color: var(--t3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
.dv { font-size: 13px; font-weight: 600; }
.dnotes { background: var(--s2); border-radius: 6px; padding: 12px; margin-bottom: 12px; font-size: 13px; line-height: 1.6; color: var(--t2); }
/* EDIT FORM */
.ef { display: flex; flex-direction: column; gap: 12px; }
.ef label { font-size: 11px; color: var(--t2); display: block; margin-bottom: 3px; }
.ef textarea { background: var(--s2); border: 1px solid var(--bdr); color: var(--txt); border-radius: 6px; padding: 9px 11px; font-size: 14px; resize: vertical; min-height: 80px; outline: none; width: 100%; }
.ef textarea:focus { border-color: var(--acc); }
.ef select, .efi { background: var(--s2); border: 1px solid var(--bdr); color: var(--txt); border-radius: 6px; padding: 10px 11px; font-size: 14px; outline: none; width: 100%; }
.ef select:focus, .efi:focus { border-color: var(--acc); }
/* INVENTORY */
.inv-list { display: flex; flex-direction: column; gap: 8px; }
.inv-card { background: var(--s2); border: 1px solid var(--bdr); border-radius: var(--r); padding: 12px 14px; }
.inv-card-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.inv-card-body { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.inv-cell { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.inv-lbl { font-size: 10px; color: var(--t3); text-transform: uppercase; }
.bxc { display: flex; align-items: center; gap: 8px; }
.bxc button { background: var(--s3); border: none; color: var(--txt); width: 30px; height: 30px; border-radius: 6px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
.bxc button:active { background: var(--acc); color: #000; }
.bxn { min-width: 26px; text-align: center; font-weight: 700; font-size: 15px; }
.low { color: var(--no); }
/* BUDGET PLANNER */
.bp { background: var(--s2); border: 1px solid var(--bdr); border-radius: var(--r); padding: 16px; margin-top: 16px; }
.bptitle { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: var(--acc); }
.sitem { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--bdr); }
.sitem:last-child { border-bottom: none; }
.stotal { display: flex; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--acc2); font-weight: 700; font-size: 14px; }
/* RECIPES */
.rgrid { display: grid; grid-template-columns: 1fr; gap: 10px; }
.rcard { background: var(--s2); border: 1px solid var(--bdr); border-radius: var(--r); padding: 14px; }
.rcard h3 { font-size: 14px; font-weight: 700; margin-bottom: 5px; }
.rcat { font-size: 11px; color: var(--t2); margin-bottom: 7px; display: flex; align-items: center; gap: 4px; }
.cdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
/* MISC */
.shdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.stitle { font-size: 17px; font-weight: 700; color: var(--acc); }
.empty { text-align: center; padding: 40px 20px; color: var(--t3); }
.fgrid { display: grid; grid-template-columns: 1fr; gap: 10px; }
.fgrid .full { grid-column: 1/-1; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--s3); border-radius: 3px; }
/* DESKTOP */
@media (min-width: 641px) {
  body { padding-bottom: 0; }
  .bnav { display: none; }
  nav { display: flex; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(255px, 1fr)); }
  .rgrid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
  .ov { align-items: center; padding: 20px; }
  .modal { border-radius: 12px; max-width: 580px; max-height: 90vh; }
  .filters { flex-direction: row; flex-wrap: wrap; }
  .fi { flex: 1; min-width: 160px; width: auto; }
  .fs { width: auto; }
  .frow { flex: none; }
  .fgrid { grid-template-columns: 1fr 1fr; }
  .inv-list { gap: 0; }
  .inv-card { border-radius: 0; border-bottom: none; }
  .inv-card:first-child { border-radius: var(--r) var(--r) 0 0; }
  .inv-card:last-child { border-radius: 0 0 var(--r) var(--r); border-bottom: 1px solid var(--bdr); }
  .stats { grid-template-columns: repeat(4, 1fr); }
}
</style>
</head>

const IT_VER = 2;
const REC_VER = 2;

let S = {
  tab:'journal', tastings:{}, inventory:{}, recipes:DEFAULT_RECIPES.map(r=>({...r})), settings:{budget:30},
  search:'', fsys:'OL', fcol:'all', sort:'rating', showUntasted:true, rCat:'all',
};

function load() {
  try {
    const m = localStorage.getItem('nm');
    if (m) {
      const d = JSON.parse(m);
      S.tastings = d.t||{}; S.inventory = d.v||{}; S.settings = d.s||{budget:30};
      if ((d.itv||0) < IT_VER) {
        for (const k in IT) {
          if (!S.tastings[k]) S.tastings[k] = {...IT[k]};
          else { S.tastings[k].r = IT[k].r; S.tastings[k].w = IT[k].w; if (IT[k].milk) S.tastings[k].milk = true; }
        }
        saveM();
      }
    } else { for (const k in IT) S.tastings[k] = {...IT[k]}; }
    const r = localStorage.getItem('nr');
    if (r) {
      const saved = JSON.parse(r);
      // Merge any new DEFAULT_RECIPES not yet in saved list
      if ((saved._rv||0) < REC_VER) {
        const savedIds = new Set(saved.filter(x=>x.id).map(x=>x.id));
        DEFAULT_RECIPES.forEach(dr => { if (!savedIds.has(dr.id)) saved.push({...dr}); });
        saved._rv = REC_VER;
        S.recipes = saved.filter(x=>x.id);
        saveR();
      } else {
        S.recipes = saved.filter(x=>x.id);
      }
    }
  } catch(e) { for (const k in IT) S.tastings[k] = {...IT[k]}; }
  render();
}
function saveM() { try { localStorage.setItem('nm', JSON.stringify({t:S.tastings,v:S.inventory,s:S.settings,itv:IT_VER})); } catch(e){} }
function saveR() { try { localStorage.setItem('nr', JSON.stringify([...S.recipes, {_rv:REC_VER}])); } catch(e){} }

function cupSVG(id) {
  const l = CUP_LAYERS[id] || [CF, CF, FM];
  const uid = 'cp_' + id.replace(/\W/g,'');

  if (AFFOGATO_IDS.has(id)) {
    // Wide shallow dessert bowl (coupe shape)
    const W=28, H=18, clip=`M0,0 H${W} L${W-4},${H} Q${W/2},${H+4} 4,${H} Z`;
    const t=H/3;
    return `<svg width="${W}" height="${H+6}" viewBox="0 0 ${W} ${H+6}" style="flex-shrink:0;margin-right:7px;display:inline-block;vertical-align:middle">
      <defs><clipPath id="${uid}"><path d="${clip}"/></clipPath></defs>
      <rect x="0" y="0"      width="${W}" height="${t}"   fill="${l[2]}" clip-path="url(#${uid})"/>
      <rect x="0" y="${t}"   width="${W}" height="${t}"   fill="${l[1]}" clip-path="url(#${uid})"/>
      <rect x="0" y="${t*2}" width="${W}" height="${t+4}" fill="${l[0]}" clip-path="url(#${uid})"/>
      <line x1="2" y1="${t}"   x2="${W-2}" y2="${t}"   stroke="rgba(0,0,0,0.2)" stroke-width="0.6" clip-path="url(#${uid})"/>
      <line x1="2" y1="${t*2}" x2="${W-2}" y2="${t*2}" stroke="rgba(0,0,0,0.2)" stroke-width="0.6" clip-path="url(#${uid})"/>
      <path d="${clip}" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.2"/>
      <line x1="0.6" y1="0.6" x2="${W-0.6}" y2="0.6" stroke="rgba(255,255,255,0.7)" stroke-width="1.1" stroke-linecap="round"/>
    </svg>`;

  } else if (COCKTAIL_IDS.has(id)) {
    // Martini / cocktail glass (V-shape bowl + stem + base)
    const W=26, BH=16;
    const clip=`M1,0 H${W-1} L${W/2},${BH} Z`;
    const t=BH/3;
    // Divider line x coords at each boundary (triangle narrows as y increases)
    const xAt = y => { const p=(y)/(BH); return {x1:1+p*(W/2-1), x2:(W-1)-p*(W/2-1)}; };
    const d1=xAt(t), d2=xAt(t*2);
    return `<svg width="${W}" height="${BH+14}" viewBox="0 0 ${W} ${BH+14}" style="flex-shrink:0;margin-right:7px;display:inline-block;vertical-align:middle">
      <defs><clipPath id="${uid}"><path d="${clip}"/></clipPath></defs>
      <rect x="0" y="0"      width="${W}" height="${t}"   fill="${l[2]}" clip-path="url(#${uid})"/>
      <rect x="0" y="${t}"   width="${W}" height="${t}"   fill="${l[1]}" clip-path="url(#${uid})"/>
      <rect x="0" y="${t*2}" width="${W}" height="${t}"   fill="${l[0]}" clip-path="url(#${uid})"/>
      <line x1="${d1.x1}" y1="${t}"   x2="${d1.x2}" y2="${t}"   stroke="rgba(0,0,0,0.2)" stroke-width="0.6"/>
      <line x1="${d2.x1}" y1="${t*2}" x2="${d2.x2}" y2="${t*2}" stroke="rgba(0,0,0,0.2)" stroke-width="0.6"/>
      <path d="${clip}" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.2"/>
      <line x1="1.5" y1="0.8" x2="${W-1.5}" y2="0.8" stroke="rgba(255,255,255,0.7)" stroke-width="1.1" stroke-linecap="round"/>
      <line x1="${W/2}" y1="${BH}" x2="${W/2}" y2="${BH+10}" stroke="rgba(255,255,255,0.4)" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="${W/2-5}" y1="${BH+10}" x2="${W/2+5}" y2="${BH+10}" stroke="rgba(255,255,255,0.45)" stroke-width="2" stroke-linecap="round"/>
    </svg>`;

  } else if (COLD_IDS.has(id)) {
    // Tall glass
    const W=18, H=26, clip=`M1,0 H${W-1} L${W-3},${H-2} Q${W/2},${H} 3,${H-2} Z`;
    const t=H/3;
    return `<svg width="${W+2}" height="${H}" viewBox="0 0 ${W+2} ${H}" style="flex-shrink:0;margin-right:7px;display:inline-block;vertical-align:middle">
      <defs><clipPath id="${uid}"><path d="${clip}"/></clipPath></defs>
      <rect x="0" y="0"      width="${W+2}" height="${t}"   fill="${l[2]}" clip-path="url(#${uid})"/>
      <rect x="0" y="${t}"   width="${W+2}" height="${t}"   fill="${l[1]}" clip-path="url(#${uid})"/>
      <rect x="0" y="${t*2}" width="${W+2}" height="${t}"   fill="${l[0]}" clip-path="url(#${uid})"/>
      <line x1="2" y1="${t}"   x2="${W-2}" y2="${t}"   stroke="rgba(0,0,0,0.2)" stroke-width="0.6" clip-path="url(#${uid})"/>

function recCapsules(r) {
  if (Array.isArray(r.capsules)) return r.capsules.filter(Boolean);
  if (r.capsule) return [r.capsule];
  return [];
}
function capStyle(id) {
  const hex = COLORS[id];
  if (!hex || hex.startsWith('var')) return {cls:'', style:''};
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return {cls:'clr', style:`--cap-clr:${hex};--cap-t:rgba(${r},${g},${b},.18);--cap-h:rgba(${r},${g},${b},.30);`};
}
const gt = id => S.tastings[id] || {r:null,w:null,n:''};
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function starsH(r) {
  if (r == null) return '<span style="color:var(--t3);font-size:11px">—</span>';
  const f = Math.floor(r), h = r%1>=.5?1:0, e = 5-f-h;
  return `<div class="stars">${'<span class="s f">★</span>'.repeat(f)}${h?'<span class="s h">★</span>':''}${'<span class="s e">★</span>'.repeat(e)}</div>`;
}
function starInput(forId, cur) {
  const f = Math.floor(cur||0);
  let h = `<div class="sinp" id="si-${forId}">`;
  for (let i=1;i<=5;i++) h += `<button type="button" onclick="setStar('${forId}',${i})" class="${i<=f?'on':''}">★</button>`;
  return h + `</div><input type="hidden" id="rv-${forId}" value="${cur||''}">`;
}
function setStar(id, v) {

function chipH(w) {

function ibarH(v) {

function filteredCoffees() {
  let l = (S.fsys==='all' ? [...COFFEES] : COFFEES.filter(c=>c.s===S.fsys)).filter(c=>c.col!=='Accessories');
  if (S.fcol!=='all') l = l.filter(c=>c.col===S.fcol);
  if (!S.showUntasted) l = l.filter(c=>gt(c.id).r!=null);
  if (S.search) { const q=S.search.toLowerCase(); l=l.filter(c=>c.n.toLowerCase().includes(q)||c.fla.toLowerCase().includes(q)||c.col.toLowerCase().includes(q)); }
  l.sort((a,b) => {
    const ta=gt(a.id),tb=gt(b.id);
    if (S.sort==='rating') return (tb.r||0)-(ta.r||0);
    if (S.sort==='intensity') return (b.i||0)-(a.i||0);
    if (S.sort==='name') return a.n.localeCompare(b.n);
    if (S.sort==='price') return (a.p||99)-(b.p||99);
    if (S.sort==='collection') return a.col.localeCompare(b.col) || (gt(b.id).r||0)-(gt(a.id).r||0);
    return 0;
  });
  return l;
}

function calcShop() {
  let rem = S.settings.budget, list = [];
  const needs = COFFEES.filter(c=>S.inventory[c.id]?.tracked&&c.p)
    .map(c=>{const v=S.inventory[c.id];return{c,def:Math.max(0,v.min-v.boxes),bp:c.p*10};})
    .filter(n=>n.def>0).sort((a,b)=>b.def-a.def);
  for (const n of needs) {
    if (rem<=0) break;
    const b = Math.min(n.def, Math.floor(rem/n.bp));
    if (b>0) { list.push({c:n.c,b,cost:b*n.bp}); rem-=b*n.bp; }
  }
  return list;
}

          <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap">
            <span style="font-size:10px;font-weight:600;color:${cfg.c};background:${cfg.c}22;border:1px solid ${cfg.c}44;border-radius:10px;padding:1px 8px">${esc(r.cat)}</span>
            ${caps.slice(0,2).map(c=>`<span style="font-size:10px;color:var(--t2)">${esc(c.n)}</span>`).join('<span style="color:var(--t3)"> · </span>')}${caps.length>2?`<span style="font-size:10px;color:var(--t3)"> +${caps.length-2}</span>`:''}
          </div>
          ${r.desc?`<div style="font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:8px">${esc(r.desc)}</div>`:''}
          ${firstStep?`<div style="font-size:11px;color:var(--t3);font-style:italic">${esc(firstStep.length>70?firstStep.slice(0,70)+'…':firstStep)}</div>`:''}
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:12px">
        <span style="font-size:12px;font-weight:600;color:var(--acc);opacity:0.8">Ver receta →</span>
      </div>
    </div>`;
  })() : '';

  return `
    <div class="shdr">
      <div class="stitle">🍹 Recetario</div>
      <button class="btn ba" onclick="openRecipeModal()">+ Nueva</button>
    </div>
    ${dailyCard}
    <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px">${catBtns}</div>
    ${S.recipes.length===0 ? `<div class="empty"><div style="font-size:36px;margin-bottom:8px">🍹</div><p>Tu recetario está vacío.<br>Tocá <strong>+ Nueva</strong> para agregar la primera receta.</p></div>` : (() => {
      const recCard = r => {
        const cfg = CATS[r.cat]||CATS['Otro'];
        const capPills = recCapsules(r).map(id=>byId(id)).filter(Boolean).map(c=>`<span style="background:rgba(200,169,110,.12);color:var(--acc);border:1px solid rgba(200,169,110,.28);border-radius:10px;font-size:10px;font-weight:600;padding:1px 7px;white-space:nowrap">${esc(c.n)}</span>`).join('');
        return `<div class="rcard" style="border-top:3px solid ${cfg.c};cursor:pointer" onclick="openRecipeDetail('${r.id}')">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
            <h3 style="display:flex;align-items:center;gap:0">${cupSVG(r.id)}${esc(r.name)}</h3>
            <div style="display:flex;gap:4px">
              <button onclick="event.stopPropagation();openRecipeModal('${r.id}')" style="background:none;border:none;color:var(--t2);cursor:pointer;font-size:16px;padding:2px">✏</button>
              <button onclick="event.stopPropagation();delRecipe('${r.id}')" style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;padding:2px">✕</button>
            </div>
          </div>
          <div class="rcat" style="flex-wrap:wrap"><span class="cdot" style="background:${cfg.c}"></span>${esc(r.cat)}${capPills?`<span style="display:flex;gap:4px;flex-wrap:wrap;margin-left:4px">${capPills}</span>`:''}</div>
          ${r.desc?`<div style="font-size:13px;color:var(--t2);line-height:1.5;margin-bottom:6px">${esc(r.desc)}</div>`:''}
          ${r.ingredients?`<div style="font-size:12px;color:var(--t2);margin-bottom:4px"><strong>Ingredientes:</strong> ${esc(r.ingredients)}</div>`:''}
          ${r.steps?`<div style="font-size:12px;color:var(--t3);white-space:pre-line;line-height:1.4">${esc(r.steps)}</div>`:''}
          <div style="margin-top:6px">${starsH(r.rating)}</div>
        </div>`;
      };
      if (S.rCat !== 'all') return `<div class="rgrid">${recs.map(recCard).join('')}</div>`;
      const catOrder = Object.keys(CATS);
      return catOrder.map(cat => {
        const group = recs.filter(r => (r.cat||'Otro') === cat);
        if (!group.length) return '';
        const cfg = CATS[cat];
        return `<div style="margin-bottom:20px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
            <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${cfg.c}"></span>
            <span style="font-size:12px;font-weight:700;color:${cfg.c};text-transform:uppercase;letter-spacing:0.8px">${cat}</span>
            <span style="font-size:11px;color:var(--t3)">${group.length}</span>
          </div>
          <div class="rgrid">${group.map(recCard).join('')}</div>
        </div>`;
      }).join('');
    })()}`;
}

function openRecipeDetail(id) {
  const r = S.recipes.find(x=>x.id===id);
  if (!r) return;
  const cfg = CATS[r.cat]||CATS['Otro'];
  const caps = recCapsules(r).map(cid=>byId(cid)).filter(Boolean);
  const capPills = caps.map(c=>`<span style="background:rgba(200,169,110,.12);color:var(--acc);border:1px solid rgba(200,169,110,.28);border-radius:10px;font-size:11px;font-weight:600;padding:2px 9px">${esc(c.n)}</span>`).join('');
  const steps = (r.steps||'').split('\n').map(s => {
    const isAero = s.startsWith('[Aeroccino]');
    const text = isAero ? s.replace('[Aeroccino]','').trim() : s;
    if (!text) return '';
    if (isAero) return `<div style="display:flex;gap:10px;padding:8px 10px;background:rgba(200,169,110,.07);border-left:3px solid var(--acc);border-radius:0 6px 6px 0;margin:4px 0"><span style="font-size:11px;font-weight:700;color:var(--acc);flex-shrink:0;padding-top:1px">Aeroccino</span><span style="font-size:13px;color:var(--t2);line-height:1.5">${esc(text)}</span></div>`;
    return `<div style="font-size:13px;color:var(--txt);line-height:1.6;padding:3px 0">${esc(s)}</div>`;
  }).join('');
  document.getElementById('mt').innerHTML = `<div style="display:flex;align-items:center;gap:8px">${cupSVG(r.id)}<span>${esc(r.name)}</span><span style="font-size:11px;font-weight:600;color:${cfg.c};background:${cfg.c}22;border:1px solid ${cfg.c}44;border-radius:10px;padding:1px 8px">${esc(r.cat)}</span></div>`;
  document.getElementById('mb').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:16px">
      ${capPills?`<div style="display:flex;gap:6px;flex-wrap:wrap">${capPills}</div>`:''}
      ${r.desc?`<p style="font-size:14px;color:var(--t2);line-height:1.6;margin:0">${esc(r.desc)}</p>`:''}
      ${r.ingredients?`<div style="background:var(--s2);border-radius:8px;padding:12px 14px">
        <div style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px">Ingredientes</div>
        <div style="font-size:13px;color:var(--txt);line-height:1.6">${esc(r.ingredients)}</div>
      </div>`:''}
      ${steps?`<div>
        <div style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px">Preparación</div>
        ${steps}
      </div>`:''}
      <div style="border-top:1px solid var(--bdr);padding-top:14px">
        <div style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px">Tu review</div>
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          ${starInput('rdet',r.rating)}
          <button class="btn ba" onclick="saveRecipeRating('${r.id}')" style="padding:6px 16px;font-size:13px">Guardar</button>
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px;padding-top:4px">
        <button class="btn bg" onclick="closeModal()">Cerrar</button>
        <button class="btn bg" onclick="closeModal();openRecipeModal('${r.id}')">✏ Editar receta</button>
      </div>
    </div>`;
  document.getElementById('ov').style.display = 'flex';
}
function saveRecipeRating(id) {
  const val = parseFloat(document.getElementById('rv-rdet').value)||null;
  const rec = S.recipes.find(r=>r.id===id);
  if (rec) { rec.rating = val; saveR(); render(); }
  closeModal();
}

function openRecipeModal(id=null) {
  const rec = id ? S.recipes.find(r=>r.id===id) : null;
  document.getElementById('mt').textContent = id ? 'Editar receta' : 'Nueva receta';
  const _selCaps = recCapsules(rec||{});
  const capOpts = COFFEES.map(c=>`<option value="${c.id}"${_selCaps.includes(c.id)?' selected':''}>${c.s} — ${esc(c.n)}</option>`).join('');
  document.getElementById('mb').innerHTML = `
    <div class="ef">
      <div class="fgrid">
        <div class="full"><label>Nombre</label><input class="efi" id="r-name" value="${esc(rec?.name||'')}" placeholder="Ej: Iced Colombia Tonic"></div>
        <div><label>Categoría</label><select class="ef select" id="r-cat">${Object.keys(CATS).map(c=>`<option${rec?.cat===c?' selected':''}>${c}</option>`).join('')}</select></div>
        <div class="full"><label>Cápsulas <span style="font-weight:400;color:var(--t3)">(Ctrl+click para seleccionar varias)</span></label><select multiple id="r-caps" style="height:130px;background:var(--s2);border:1px solid var(--bdr);color:var(--txt);border-radius:6px;padding:4px;font-size:13px;outline:none;width:100%">${capOpts}</select></div>
        <div class="full"><label>Descripción</label><textarea id="r-desc" placeholder="Descripción general...">${esc(rec?.desc||'')}</textarea></div>
        <div class="full"><label>Ingredientes</label><input class="efi" id="r-ing" value="${esc(rec?.ingredients||'')}" placeholder="Ej: 1 cápsula, 100ml tónica, hielo..."></div>
        <div class="full"><label>Pasos</label><textarea id="r-steps" placeholder="1. Extraer espresso&#10;2. ...">${esc(rec?.steps||'')}</textarea></div>
        <div class="full"><label>Rating</label>${starInput('rec',rec?.rating)}</div>
      </div>
      <div class="brow">
        <button class="btn bg" onclick="closeModal()">Cancelar</button>
        <button class="btn ba" onclick="saveRecipe('${id||''}')">Guardar</button>
      </div>
    </div>`;
  document.getElementById('ov').style.display = 'flex';
}
function saveRecipe(editId) {
  const name = document.getElementById('r-name').value.trim();
  if (!name) { alert('Escribí un nombre.'); return; }
  const _caps = [...document.getElementById('r-caps').selectedOptions].map(o=>o.value).filter(Boolean);
  const rec = { id:editId||'rec_'+Date.now(), name, cat:document.getElementById('r-cat').value, capsules:_caps, desc:document.getElementById('r-desc').value.trim(), ingredients:document.getElementById('r-ing').value.trim(), steps:document.getElementById('r-steps').value.trim(), rating:parseFloat(document.getElementById('rv-rec').value)||null };
  if (editId) { const i=S.recipes.findIndex(r=>r.id===editId); if(i>=0) S.recipes[i]=rec; } else S.recipes.push(rec);
  saveR(); closeModal(); render();
}
function delRecipe(id) { if(!confirm('¿Eliminar esta receta?'))return; S.recipes=S.recipes.filter(r=>r.id!==id); saveR(); render(); }

function openCoffee(id) { renderCoffeeModal(id,false); document.getElementById('ov').style.display='flex'; }
function renderCoffeeModal(id, editing) {
  const c = byId(id), t = gt(id), has = t.r!=null, clr = COLORS[id] || 'var(--bdr)';
  document.getElementById('mt').innerHTML = `<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span style="width:13px;height:13px;border-radius:3px;background:${clr};flex-shrink:0;display:inline-block;border:1px solid rgba(255,255,255,.15)"></span>${esc(c.n)}<span class="badge ${c.s}">${c.s}</span></div>`;
  if (!editing) {
    document.getElementById('mb').innerHTML = `
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:13px;flex-wrap:wrap">
        <span style="font-size:12px;color:var(--t2)">${esc(c.col)}</span>
        ${c.lim?'<span class="chip Maybe" style="font-size:10px">Limited</span>':''}
        ${c.milk?'<span style="font-size:10px;color:var(--t3);background:var(--s3);padding:2px 7px;border-radius:12px">For Milk</span>':''}
        ${c.exo?'<span style="font-size:10px;color:var(--acc2);background:rgba(200,169,110,.1);padding:2px 7px;border-radius:12px">✦ Exótico</span>':''}
      </div>
      <div class="drow">
        <div class="di"><div class="dl">Intensidad</div><div class="dv">${c.i?c.i+'/13':'N/A'}</div></div>
        <div class="di"><div class="dl">Taza</div><div class="dv" style="font-size:12px">${esc(c.sz)}</div></div>
        <div class="di"><div class="dl">Tostado</div><div class="dv" style="font-size:12px">${esc(c.ro)}</div></div>
        <div class="di"><div class="dl">Precio</div><div class="dv">${c.p?'€'+c.p.toFixed(2):'—'}</div></div>
      </div>
      <div class="di" style="margin-bottom:11px"><div class="dl">Perfil</div><div style="font-size:13px;margin-top:3px">${esc(c.fla)}</div></div>
      <div class="di" style="margin-bottom:14px"><div class="dl">Official Notes</div><div style="font-size:12px;margin-top:3px;color:var(--t2)">${esc(c.an)}</div></div>
      <div style="font-size:12px;font-weight:600;color:var(--acc);margin-bottom:9px">Tu Tasting</div>
      ${has ? `
      <div class="drow">
        <div class="di"><div class="dl">Rating</div><div style="display:flex;align-items:center;gap:6px;margin-top:3px">${starsH(t.r)}<span style="font-size:12px;color:var(--acc)">${t.r}/5</span>${t.milk?'<span style="font-size:10px;color:var(--t3)">· with milk</span>':''}</div></div>
        <div class="di"><div class="dl">¿Lo comprás?</div><div style="margin-top:3px">${chipH(t.w)}</div></div>
      </div>
      <div class="dnotes">${esc(t.n)||'<em>Sin notas.</em>'}</div>` :
      `<div class="dnotes" style="color:var(--t3);font-style:italic">Sin tasting registrado aún.</div>`}
      <div class="brow">
        <button class="btn bg" onclick="${S.inventory[id]?.tracked?`removeInv('${id}')`:` addInvDirect('${id}')`}">${S.inventory[id]?.tracked?'📦 Quitar':'📦 Inventario'}</button>
        <button class="btn ba" onclick="renderCoffeeModal('${id}',true)">✏ ${has?'Editar':'Agregar'} tasting</button>
      </div>`;
  } else {
    document.getElementById('mb').innerHTML = `
      <div class="ef">
        <div><label>Rating (doble toque en misma estrella = medio punto)</label>${starInput(id,t.r)}</div>
        <div><label>¿Lo comprarías?</label>
          <select class="ef select" id="wb-${id}">
            <option value="">—</option>
            <option value="Yes"${t.w==='Yes'?' selected':''}>✓ Sí, lo compraría</option>
            <option value="Maybe"${t.w==='Maybe'?' selected':''}>~ Tal vez</option>
            <option value="No"${t.w==='No'?' selected':''}>✗ No</option>
          </select>
        </div>
        <div><label>Notas personales</label>
          <textarea id="nt-${id}" placeholder="Aroma, sabor, acidez, cuerpo, retrogusto...">${esc(t.n||'')}</textarea>
        </div>
        <div class="brow">
          <button class="btn bg" onclick="renderCoffeeModal('${id}',false)">← Volver</button>
          <button class="btn ba" onclick="saveTasting('${id}')">Guardar</button>
        </div>
      </div>`;
  }
}
function saveTasting(id) {
  const rv = document.getElementById('rv-'+id).value;
  S.tastings[id] = { r:rv?parseFloat(rv):null, w:document.getElementById('wb-'+id).value||null, n:document.getElementById('nt-'+id).value.trim() };
  saveM(); renderCoffeeModal(id,false);
}

function exportData() {
  const json = JSON.stringify({tastings:S.tastings,inventory:S.inventory,recipes:S.recipes,settings:S.settings},null,2);
  document.getElementById('mt').textContent = '💾 Exportar datos';
  document.getElementById('mb').innerHTML = `
    <p style="font-size:13px;color:var(--t2);margin-bottom:12px">Copiá este JSON y guardalo en Notes, Drive, o donde quieras. Si la app pierde datos, lo importás y recuperás todo.</p>
    <textarea id="exp-ta" readonly style="width:100%;height:220px;background:var(--s3);border:1px solid var(--bdr);color:var(--txt);border-radius:6px;padding:10px;font-size:11px;font-family:monospace;resize:none">${json}</textarea>
    <div class="brow" style="margin-top:10px">
      <button class="btn bg" onclick="closeModal()">Cerrar</button>
      <button class="btn ba" onclick="navigator.clipboard.writeText(document.getElementById('exp-ta').value).then(()=>{this.textContent='✓ Copiado!'})">📋 Copiar JSON</button>
    </div>`;
  document.getElementById('ov').style.display='flex';
}
function importData() {
  document.getElementById('mt').textContent = '📥 Importar datos';
  document.getElementById('mb').innerHTML = `
    <p style="font-size:13px;color:var(--t2);margin-bottom:12px">Pegá el JSON que exportaste antes. Esto reemplaza todos los datos actuales.</p>
    <textarea id="imp-ta" style="width:100%;height:220px;background:var(--s3);border:1px solid var(--bdr);color:var(--txt);border-radius:6px;padding:10px;font-size:11px;font-family:monospace;resize:none" placeholder='Pegá el JSON aquí...'></textarea>
    <div id="imp-err" style="color:var(--no);font-size:12px;margin-top:6px;display:none">JSON inválido. Revisá que esté bien copiado.</div>
    <div class="brow" style="margin-top:10px">
      <button class="btn bg" onclick="closeModal()">Cancelar</button>
      <button class="btn ba" onclick="doImport()">Importar</button>
    </div>`;
  document.getElementById('ov').style.display='flex';
}
function doImport() {
  try {
    const d = JSON.parse(document.getElementById('imp-ta').value);
    if (d.tastings) S.tastings = d.tastings;
    if (d.inventory) S.inventory = d.inventory;
    if (d.recipes) S.recipes = d.recipes;
    if (d.settings) S.settings = d.settings;
    saveM(); saveR(); closeModal(); render();
  } catch(e) {
    document.getElementById('imp-err').style.display = 'block';
  }
}
function exportData_menu() {
  document.getElementById('mt').textContent = '💾 Datos';
  document.getElementById('mb').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:10px;padding:8px 0">
      <button class="btn ba" onclick="exportData()" style="width:100%;text-align:left;padding:12px 16px">📤 Exportar (copiar JSON)</button>
      <button class="btn bg" onclick="importData()" style="width:100%;text-align:left;padding:12px 16px">📥 Importar (pegar JSON)</button>
    </div>
    <p style="font-size:12px;color:var(--t3);margin-top:8px">Exportá tus datos regularmente para no perderlos si la app se actualiza.</p>`;
  document.getElementById('ov').style.display='flex';
}

function maybeClose(e) { if(e.target===document.getElementById('ov')) closeModal(); }
function closeModal() { document.getElementById('ov').style.display='none'; render(); }

function go(tab) {
  S.tab = tab;
  document.querySelectorAll('[data-tab]').forEach(b => b.classList.toggle('on', b.dataset.tab===tab));
  render();
}
function render() {
  const app = document.getElementById('app');
  if (S.tab==='journal') app.innerHTML = renderJournal();
  else if (S.tab==='inventory') app.innerHTML = renderInventory();
  else app.innerHTML = renderRecipes();
}

load();
</script>
</body>
</html>
